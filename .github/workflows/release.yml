name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, must match package.json version (e.g. v4.0.5). Leave empty to only build, without creating a release."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-2022
            build-script: build:win
            python-version: "3.9"
            artifact-suffix: windows
          # Windows arm64: Electron and the Rust addon build natively, but
          # libtorrent has no win-arm64 wheels, so the Python RPC is built
          # with x64 Python and runs under Windows on ARM x64 emulation
          - os: windows-11-arm
            build-script: build:win-arm64
            python-version: "3.9"
            python-arch: x64
            artifact-suffix: windows-arm64
          - os: ubuntu-latest
            build-script: build:linux
            python-version: "3.9"
            artifact-suffix: linux
          # macOS arm64 (Apple Silicon)
          - os: macos-latest
            build-script: build:mac
            python-version: "3.11"
            artifact-suffix: macos
          # macOS x64 (Intel)
          - os: macos-15-intel
            build-script: build:mac
            python-version: "3.11"
            artifact-suffix: macos-intel
      fail-fast: false

    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        if: inputs.tag != ''
        run: node -e "const v = 'v' + require('./package.json').version; const tag = '${{ inputs.tag }}'; if (tag !== v) { console.error('Tag ' + tag + ' does not match package.json version ' + v + '.'); process.exit(1); }"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.0
          cache: "yarn"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.python-arch }}

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build
        run: yarn ${{ matrix.build-script }}
        env:
          MAIN_VITE_API_URL: ${{ vars.MAIN_VITE_API_URL }}
          MAIN_VITE_AUTH_URL: ${{ vars.MAIN_VITE_AUTH_URL }}
          MAIN_VITE_CHECKOUT_URL: ${{ vars.MAIN_VITE_CHECKOUT_URL }}
          MAIN_VITE_NIMBUS_API_URL: ${{ vars.MAIN_VITE_NIMBUS_API_URL }}
          RENDERER_VITE_EXTERNAL_RESOURCES_URL: ${{ vars.EXTERNAL_RESOURCES_URL }}
          MAIN_VITE_EXTERNAL_RESOURCES_URL: ${{ vars.EXTERNAL_RESOURCES_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          RENDERER_VITE_SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          RENDERER_VITE_REAL_DEBRID_REFERRAL_ID: ${{ vars.RENDERER_VITE_REAL_DEBRID_REFERRAL_ID }}
          RENDERER_VITE_TORBOX_REFERRAL_CODE: ${{ vars.RENDERER_VITE_TORBOX_REFERRAL_CODE }}
          MAIN_VITE_LAUNCHER_SUBDOMAIN: ${{ vars.MAIN_VITE_LAUNCHER_SUBDOMAIN }}
          # No Apple Developer certificate: skip codesign discovery
          # (electron-builder ad-hoc signs the app instead)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Rename builder debug file per platform
        shell: bash
        run: |
          if [[ -f dist/builder-debug.yml ]]; then
            cp dist/builder-debug.yml dist/builder-debug-${{ matrix.artifact-suffix }}.yml
          fi

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.os }}
          path: |
            dist/*-portable*.exe
            dist/*-setup*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.yml
            dist/*.blockmap
            !dist/builder-debug.yml

  release:
    if: inputs.tag != ''
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install js-yaml
        run: npm install --no-save --ignore-scripts --engine-strict=false js-yaml

      - name: Collect release assets
        run: node scripts/collect-release-assets.cjs artifacts release-assets

      # Creates a draft release; the git tag is created automatically
      # when the draft is published, pointing at the commit built here
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
